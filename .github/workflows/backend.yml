name: CI/CD Backend — Build, Push ECR, Deploy EC2
on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: casino-backend
  CONTAINER_NAME: casino-backend

jobs:
  # ETAPA 1: Build de la imagen Docker y push a ECR
  build-and-push:
    name: Build & Push imagen a ECR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login al Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de la imagen
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:v1.0.0

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:v1.0.0

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ETAPA 2: Deploy automático en EC2 privada (backend)
  deploy:
    name: Deploy en EC2 backend
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy vía SSH a EC2 backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          # ---- Destino: EC2 privada (backend) ----
          host: ${{ secrets.EC2_BACKEND_HOST }}      # IP privada, ej: 10.0.2.15
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          # ---- Jump host: EC2 pública (bastion/frontend) ----
          proxy_host: ${{ secrets.EC2_BASTION_HOST }} # IP pública del bastion
          proxy_username: ec2-user
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set aws_session_token ${{ secrets.AWS_SESSION_TOKEN }}
            aws configure set region us-east-1

            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              ${{ steps.login-ecr.outputs.registry }}

            docker pull ${{ needs.build-and-push.outputs.image }}

            docker stop casino-backend || true
            docker rm   casino-backend || true

            docker run -d \
              --name casino-backend \
              --restart unless-stopped \
              --network casino-net \
              -e PORT=3000 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e DB_HOST=casino-db \
              -e DB_PORT=5432 \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DB_NAME=casino_db \
              -e CORS_ORIGIN="http://${{ secrets.EC2_FRONTEND_HOST }}" \
              ${{ needs.build-and-push.outputs.image }}

            echo "✅ Backend desplegado correctamente"