name: CI/CD Backend - Build, Push ECR y Deploy EKS

on:
  push:
    branches:
      - deploy

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPOSITORY: casino-backend
  ECR_DB_REPOSITORY: casino-db
  CLUSTER_NAME: vidalcasino-cluster
  NAMESPACE: vidalcasino

jobs:
  build-and-push:
    name: Build & Push imágenes a ECR
    runs-on: ubuntu-latest

    outputs:
      backend_image: ${{ steps.build-backend.outputs.image }}
      db_image: ${{ steps.build-db.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen Backend
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build y Push imagen DB
        id: build-db
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG ./db
          docker tag $ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_DB_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_DB_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy en Amazon EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Verificar conexión al cluster
        run: |
          kubectl get nodes

      - name: Crear namespace si no existe
        run: |
          kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE

      - name: Aplicar secrets
        run: |
          kubectl apply -f k8s/casino-secrets.yaml -n $NAMESPACE

      - name: Aplicar manifests DB
        run: |
          kubectl apply -f k8s/db/ -n $NAMESPACE

      - name: Aplicar manifests Backend
        run: |
          kubectl apply -f k8s/backend/ -n $NAMESPACE

      - name: Actualizar imagen DB
        run: |
          kubectl set image deployment/casino-db \
            casino-db=${{ needs.build-and-push.outputs.db_image }} \
            -n $NAMESPACE

      - name: Actualizar imagen Backend
        run: |
          kubectl set image deployment/casino-backend \
            casino-backend=${{ needs.build-and-push.outputs.backend_image }} \
            -n $NAMESPACE

      - name: Esperar rollout DB
        run: |
          kubectl rollout status deployment/casino-db \
            -n $NAMESPACE --timeout=300s

      - name: Esperar rollout Backend
        run: |
          kubectl rollout status deployment/casino-backend \
            -n $NAMESPACE --timeout=300s

      - name: Ver recursos finales
        run: |
          kubectl get all -n $NAMESPACE