apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-bonos
  namespace: vidalcasino
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-bonos
  template:
    metadata:
      labels:
        app: casino-bonos
    spec:
      containers:
        - name: casino-bonos
          image: 147588477011.dkr.ecr.us-east-1.amazonaws.com/casino-bonos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: casino-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: casino-secrets
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: casino-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casino-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: casino-secrets
                  key: DB_NAME
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: 8004
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"